<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Səhifə tapılmadı - Dr. Azad Məlikov</title>
    <meta name="robots" content="noindex, nofollow">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Work Sans', sans-serif;
            background: linear-gradient(160deg, #EDF5FF 0%, #F6FAFF 40%, #FFFFFF 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #11295A;
        }

        .error-container {
            text-align: center;
            max-width: 600px;
        }

        .error-code {
            font-size: 120px;
            font-weight: 700;
            color: #134195;
            line-height: 1;
            margin-bottom: 20px;
        }

        .error-title {
            font-size: 32px;
            font-weight: 600;
            color: #11295A;
            margin-bottom: 16px;
        }

        .error-message {
            font-size: 18px;
            color: rgba(17, 41, 90, 0.7);
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 32px;
            background: #134195;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .btn-home:hover {
            background: #0f3478;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(19, 65, 149, 0.25);
        }

        .links {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .links a {
            color: #134195;
            text-decoration: none;
            font-weight: 500;
        }

        .links a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .error-code {
                font-size: 80px;
            }

            .error-title {
                font-size: 24px;
            }

            .error-message {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <h1 class="error-title">Səhifə tapılmadı</h1>
        <p class="error-message">
            Axtardığınız səhifə mövcud deyil və ya köçürülüb. 
            Ana səhifəyə qayıdaraq lazımi məlumatı tapa bilərsiniz.
        </p>
        
        <a href="/" class="btn-home">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                <path d="M7.5 15L2.5 10L7.5 5M2.5 10H17.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Ana səhifəyə qayıt
        </a>

        <div class="links">
            <a href="/#about">Haqqımızda</a>
            <a href="/#services">Xidmətlər</a>
            <a href="/#contact">Əlaqə</a>
            <a href="tel:+994516279820">Telefon: 051 627 98 20</a>
        </div>
    </div>
</body>
</html>
